<svg xmlns="http://www.w3.org/2000/svg" width="360" height="100" viewBox="0 0 360 100">
  <defs>
    <style>
      .txt { fill: #e6edf3; }
      .hl  { fill: #ff79c6; }

      @media (prefers-color-scheme: light) {
        .txt { fill: #1f2328; }
        .hl  { fill: #8250df; }
      }

      @keyframes blink {
        50% { opacity: 0; }
      }

      .cr { animation: blink 0.65s step-end 2.5s infinite; }
      .tp { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 28px; }
    </style>

    <clipPath id="c1"><rect height="42"><animate attributeName="width" from="0" to="320" dur="1.2s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/></rect></clipPath>
  </defs>

  <text class="tp txt" x="180" y="55" text-anchor="middle" clip-path="url(#c1)">Hi 👋 I'm <tspan class="hl">Yunlk</tspan></text>

  <text class="tp txt cr" x="180" y="55" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="1.5s" fill="freeze"/>
    <tspan>|</tspan>
  </text>
</svg>

<svg width="480" height="140" viewBox="0 0 480 140" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Card background -->
  <rect width="480" height="140" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1" />

  <!-- Album art -->
  <defs>
    <clipPath id="art-clip">
      <rect x="16" y="16" width="108" height="108" rx="8" />
    </clipPath>
  </defs>
  <image x="16" y="16" width="108" height="108" clip-path="url(#art-clip)"
         href="album-art.jpg"
         preserveAspectRatio="xMidYMid slice" />

  <!-- Song title -->
  <text x="140" y="48" fill="#f0f6fc" font-size="18" font-weight="700" font-family="system-ui, -apple-system, sans-serif">
    ももいろの鍵
  </text>

  <!-- Artist -->
  <text x="140" y="74" fill="#8b949e" font-size="14" font-family="system-ui, -apple-system, sans-serif">
    いよわ feat. 初音ミク
  </text>

  <!-- Progress bar -->
  <rect x="140" y="90" width="160" height="3" rx="1.5" fill="#21262d" />
  <rect x="140" y="90" width="60" height="3" rx="1.5" fill="#1f6feb" />

  <!-- Now playing -->
  <circle cx="145" cy="107" r="4" fill="#3fb950" />
  <text x="155" y="111" fill="#3fb950" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="600">
    NOW PLAYING
  </text>

  <!-- NetEase branding -->
  <text x="140" y="130" fill="#e60026" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="600">
    ♪ NetEase Cloud Music
  </text>

  <!-- Play button -->
  <circle cx="400" cy="110" r="18" fill="#1f6feb" opacity="0.15" />
  <polygon points="394,100 394,120 410,110" fill="#58a6ff" />
</svg>

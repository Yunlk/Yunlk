<svg width="480" height="130" viewBox="0 0 480 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background -->
  <rect width="480" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1" />

  <!-- Album art placeholder (peach gradient representing ももいろの鍵) -->
  <defs>
    <clipPath id="art-clip">
      <rect x="16" y="12" width="105" height="105" rx="8" />
    </clipPath>
    <linearGradient id="album-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a9e" />
      <stop offset="50%" stop-color="#fad0c4" />
      <stop offset="100%" stop-color="#ffecd2" />
    </linearGradient>
  </defs>
  <rect x="16" y="12" width="105" height="105" rx="8" fill="url(#album-grad)" />
  <text x="68" y="72" fill="#e8708a" font-size="32" text-anchor="middle" font-family="system-ui, sans-serif">♪</text>
  <rect x="16" y="12" width="105" height="105" rx="8" fill="none" stroke="#30363d" stroke-width="1" />

  <!-- Song title (Japanese) -->
  <text x="140" y="42" fill="#f0f6fc" font-size="18" font-weight="700" font-family="system-ui, -apple-system, sans-serif">
    ももいろの鍵
  </text>

  <!-- Song title (Chinese) -->
  <text x="140" y="64" fill="#8b949e" font-size="13" font-family="system-ui, -apple-system, sans-serif">
    桃色钥匙
  </text>

  <!-- Artist -->
  <text x="140" y="86" fill="#8b949e" font-size="13" font-family="system-ui, -apple-system, sans-serif">
    いよわ feat. 初音ミク
  </text>

  <!-- Now playing -->
  <circle cx="145" cy="107" r="4" fill="#3fb950" />
  <text x="155" y="111" fill="#3fb950" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="600">
    NOW PLAYING
  </text>

  <!-- Play button -->
  <circle cx="400" cy="100" r="18" fill="#1f6feb" opacity="0.15" />
  <polygon points="394,90 394,110 410,100" fill="#58a6ff" />
</svg>

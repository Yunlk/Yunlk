name: Cache Buster

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump cache versions
        run: |
          import re

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          changed = False

          # WakaTime badge
          m = re.search(r'wakatime\.com/badge/user/([^"?]+)\.svg\?v=(\d+)', content)
          if m:
              uid, v = m.group(1), int(m.group(2))
              content = content.replace(
                  f'wakatime.com/badge/user/{uid}.svg?v={v}',
                  f'wakatime.com/badge/user/{uid}.svg?v={v + 1}'
              )
              print(f'Bumped WakaTime: v{v} → v{v + 1}')
              changed = True

          # maimai DX Rating
          m = re.search(r'dxrating\.luoling\.moe/api/genImage/([^"?]+)\?v=(\d+)', content)
          if m:
              user, v = m.group(1), int(m.group(2))
              content = content.replace(
                  f'dxrating.luoling.moe/api/genImage/{user}?v={v}',
                  f'dxrating.luoling.moe/api/genImage/{user}?v={v + 1}'
              )
              print(f'Bumped maimai: v{v} → v{v + 1}')
              changed = True

          if not changed:
              print('Nothing to bump, exiting.')
              exit(0)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(content)
        shell: python

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add README.md && git commit -m "🔄 cache refresh" && git push)

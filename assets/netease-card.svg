<svg width="480" height="130" viewBox="0 0 480 130" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Card background -->
  <rect width="480" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1" />

  <!-- Album art -->
  <defs>
    <clipPath id="art-clip">
      <rect x="16" y="12" width="105" height="105" rx="8" />
    </clipPath>
  </defs>
  <image x="16" y="12" width="105" height="105" clip-path="url(#art-clip)"
         href="https://raw.githubusercontent.com/Yunlk/Yunlk/master/assets/album-art.jpg"
         preserveAspectRatio="xMidYMid slice" />

  <!-- Song title -->
  <text x="140" y="40" fill="#f0f6fc" font-size="18" font-weight="700" font-family="system-ui, -apple-system, sans-serif">
    ももいろの鍵
  </text>

  <!-- Artist -->
  <text x="140" y="66" fill="#8b949e" font-size="14" font-family="system-ui, -apple-system, sans-serif">
    いよわ feat. 初音ミク
  </text>

  <!-- Now playing -->
  <circle cx="145" cy="92" r="4" fill="#3fb950" />
  <text x="155" y="96" fill="#3fb950" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="600">
    NOW PLAYING
  </text>

  <!-- NetEase branding -->
  <text x="140" y="117" fill="#e60026" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="600">
    ♪ NetEase Cloud Music
  </text>

  <!-- Play button -->
  <circle cx="400" cy="100" r="18" fill="#1f6feb" opacity="0.15" />
  <polygon points="394,90 394,110 410,100" fill="#58a6ff" />
</svg>

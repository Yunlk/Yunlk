<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280">
  <defs>
    <style>
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .cr { animation: blink 0.65s step-end 4.5s infinite; }
      .ln1 { animation: fadeIn 0.01s 0.5s both; }
      .ln2 { animation: fadeIn 0.01s 1.2s both; }
      .ln3 { animation: fadeIn 0.01s 1.8s both; }
      .ln4 { animation: fadeIn 0.01s 2.6s both; }
      .ln5 { animation: fadeIn 0.01s 3.7s both; }
      .tp { font-family: 'Courier New', Consolas, 'Liberation Mono', monospace; font-size: 14px; }
    </style>
    <clipPath id="cp1"><rect height="22"><animate attributeName="width" from="0" to="155" dur="0.4s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/></rect></clipPath>
    <clipPath id="cp2"><rect height="22"><animate attributeName="width" from="0" to="68" dur="0.3s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/></rect></clipPath>
    <clipPath id="cp3"><rect height="22"><animate attributeName="width" from="0" to="190" dur="0.5s" begin="1.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/></rect></clipPath>
    <clipPath id="cp4"><rect height="22"><animate attributeName="width" from="0" to="440" dur="0.8s" begin="2.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/></rect></clipPath>
    <clipPath id="cp5"><rect height="22"><animate attributeName="width" from="0" to="160" dur="0.5s" begin="3.7s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/></rect></clipPath>
  </defs>

  <!-- Window frame -->
  <rect x="0" y="0" width="560" height="280" rx="8" fill="#0d1117"/>
  <rect x="0" y="0" width="560" height="34" rx="8" fill="#161b22"/>
  <rect x="0" y="17" width="560" height="17" fill="#161b22"/>
  <line x1="0" y1="34" x2="560" y2="34" stroke="#30363d" stroke-width="1"/>

  <!-- Window dots -->
  <circle cx="18" cy="17" r="5.5" fill="#ff5555"/>
  <circle cx="40" cy="17" r="5.5" fill="#f1fa8c"/>
  <circle cx="62" cy="17" r="5.5" fill="#50fa7b"/>

  <!-- Title bar text -->
  <text class="tp" x="280" y="23" text-anchor="middle" fill="#8b949e" font-size="12">yunlk@github:~/profile</text>

  <!-- Terminal content -->
  <g transform="translate(22, 62)">

    <!-- Line 1: $ whoami -->
    <text class="tp ln1" y="0" fill="#50fa7b">$</text>
    <text class="tp ln1" y="0" fill="#e6edf3" clip-path="url(#cp1)"> whoami</text>

    <!-- Line 2: yunlk -->
    <text class="tp ln2" y="30" fill="#e6edf3" font-weight="bold" clip-path="url(#cp2)">  yunlk</text>

    <!-- Line 3: $ cat /etc/skills -->
    <text class="tp ln3" y="60" fill="#50fa7b">$</text>
    <text class="tp ln3" y="60" fill="#e6edf3" clip-path="url(#cp3)"> cat /etc/skills</text>

    <!-- Line 4: skills list -->
    <text class="tp ln4" y="90" clip-path="url(#cp4)">
      <tspan fill="#ff79c6">C</tspan>
      <tspan fill="#8b949e"> · </tspan>
      <tspan fill="#ff79c6">C++</tspan>
      <tspan fill="#8b949e"> · </tspan>
      <tspan fill="#ff79c6">HolyC</tspan>
      <tspan fill="#8b949e"> · </tspan>
      <tspan fill="#ff79c6">Brainfuck</tspan>
      <tspan fill="#8b949e"> · </tspan>
      <tspan fill="#ff79c6">LaTeX</tspan>
      <tspan fill="#8b949e"> · </tspan>
      <tspan fill="#ff79c6">Md</tspan>
    </text>

    <!-- Line 5: $ cat /etc/interests -->
    <text class="tp ln5" y="130" fill="#50fa7b">$</text>
    <text class="tp ln5" y="130" fill="#e6edf3" clip-path="url(#cp5)"> cat /etc/interests</text>

    <!-- Line 6: interests result -->
    <text class="tp ln5" y="160" fill="#2ea043">  Embedded · Algorithms · ACM · maimai DX</text>

    <!-- Final cursor line -->
    <text class="tp cr" x="14" y="200" fill="#50fa7b">$</text>
    <text class="tp cr" x="120" y="200" fill="#e6edf3">▊</text>

  </g>
</svg>
